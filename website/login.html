<!DOCTYPE html>
<html>

<head>
    {{ template "head" }}
    <title>Spindle - Login</title>
</head>


<body>

  <div class="container">
    <h1>Spindle</h1>
    <p>Scan the QR code with your phone to connect Spotify</p>

    <div class="login-card">
      <div class="qr">
        <img src="/login/qr?pairing_id={{.PairingID}}" />
      </div>
      <div class="d-grid gap-0 row-gap-1 text-sm text-muted">
        <p>1. Scan the QR code with your phone</p>
        <p>2. Log in to Spotify on your phone</p>
        <p>3. Return here when done</p>
      </div>
      <hr>
      <a target="_blank" href="{{.AuthUrl}}">Or authorize here</a>
    </div>
  </div>

  <script>
    const pairingId = "{{.PairingID}}";

    setInterval(() => {
      fetch(`/auth/spotify/login/status?state=${pairingId}`)
        .then(res => res.text())
        .then(data => {
          if (data === "ok") {
            window.location = "/"
          }
        });
    }, 2000)
  </script>

</body>

</html>
