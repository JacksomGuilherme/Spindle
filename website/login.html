<!DOCTYPE html>
<html>

<head>
  {{ template "head" }}
  <link href="/assets/css/login.css" rel="stylesheet">
  <title>Spindle - Login</title>
</head>


<body>

  <div class="container">
    <div class="masthead">
      <span class="wordmark">Spindle</span>
      <p class="tagline">Spotify for Kindle</p>
    </div>

    <div class="login-card">
      <!-- Corner ticks on the QR border are handled inside .qr-border -->

      <div class="qr-wrapper">
        <div class="qr-border">
          <span></span><span></span><span></span><span></span>
          <img src="/login/qr?pairing_id={{.PairingID}}" alt="QR Code" />
        </div>
      </div>

      <p class="section-label">instructions</p>

      <ul class="steps">
        <li><span class="step-num">I.</span> Scan the QR code with your phone</li>
        <li><span class="step-num">II.</span> Log in to Spotify on your phone</li>
        <li><span class="step-num">III.</span> Return here when done</li>
      </ul>

      <div class="divider"><span>or</span></div>

      <a class="auth-link" target="_blank" href="{{.AuthUrl}}">Authorize Manually</a>
    </div>
  </div>

  {{ template "footer" }}
  <script>
    const pairingId = "{{.PairingID}}";

    setInterval(() => {
      fetch(`/auth/spotify/login/status?state=${pairingId}`)
        .then(res => res.text())
        .then(data => {
          if (data === "ok") {
            window.location = "/"
          }
        });
    }, 2000)
  </script>

</body>

</html>
