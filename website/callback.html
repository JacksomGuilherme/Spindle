<!DOCTYPE html>
<html>

<head>
  {{ template "head" }}
  <title>Spindle - Callback</title>
</head>

<body>
  <div class="container">
    {{ if .Success }}
    <div class="succes-icon">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="green" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 13l4 4L19 7"></path>
      </svg>
    </div>
    <h1>Succefully connected!</h1>
    <p class="text-body-secondary">Now you can go back to your kindle</p>
    {{ else }}
    <div class="error-icon">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="red" stroke-width="1.5" stroke-linecap="round">
        <path d="M6 6l12 12M18 6l-12 12"></path>
      </svg>
    </div>
    <h1>Error!</h1>
    <p class="text-body-secondary">{{ .Error }}</p>
    {{ end }}
  </div>
</body>

</html>
