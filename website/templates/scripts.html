{{ define "polling_device" }}

<script>
    setInterval(() => {
        fetch(`/device`, {
            method: 'GET',
            headers: {
                'Content-Type': 'application/json',
            }
        }).then((res) => { return res.json() }).then((data) => {
            if (data) {
                window.location.reload()
            }
        })
    }, 5000)
</script>

{{ end }}
